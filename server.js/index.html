<!DOCTYPE html>
<html>
<head>
  <title>MediAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h2>MediAI</h2>
  <button>Sign In</button>
</header>

<section class="hero">
  <h1>From Symptom to Specialist in 3 Steps</h1>
</section>

<section class="steps">
  <div class="card">Step 1: Submit Your Case</div>
  <div class="card">Step 2: AI Analyzes Data</div>
  <div class="card">Step 3: Connect with Doctor</div>
</section>

<section class="form">
  <textarea id="symptoms" placeholder="Describe symptoms..."></textarea>
  <button onclick="analyze()">Analyze</button>
  <div id="result"></div>
</section>

<script src="script.js"></script>
</body>
</html>
